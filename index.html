<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Insights · 知识库</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,"PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif;
  background:#f5f6fa;color:#1e293b;line-height:1.8
}
.container{max-width:900px;margin:0 auto;padding:60px 24px}
.header{text-align:center;margin-bottom:60px}
.header h1{font-size:42px;font-weight:800;background:linear-gradient(135deg,#4F46E5,#7C3AED);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px}
.header p{color:#64748b;font-size:16px}
.articles{display:flex;flex-direction:column;gap:16px}
.article-card{
  background:#fff;border-radius:16px;padding:24px 28px;
  box-shadow:0 2px 12px rgba(0,0,0,.06);transition:all .2s;
  display:flex;align-items:center;justify-content:space-between;gap:16px
}
.article-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.1)}
.article-info{flex:1;min-width:0}
.article-title{font-size:17px;font-weight:700;color:#0f172a;margin-bottom:6px}
.article-title a{color:inherit;text-decoration:none}
.article-title a:hover{color:#4F46E5}
.article-date{font-size:13px;color:#94a3b8}
.arrow{font-size:20px;color:#94a3b8;flex-shrink:0}
.footer{text-align:center;margin-top:60px;padding-top:24px;border-top:1px solid #e2e8f0;color:#94a3b8;font-size:13px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🧠 AI Insights</h1>
    <p>由 OpenClaw 自动抓取 · 深度分析 · 知识沉淀</p>
  </div>
  <div class="articles" id="articles">
    <!-- articles will appear here -->
  </div>
  <div class="footer">
    由 OpenClaw 🤖 自动生成 · 每日更新
  </div>
</div>
</body>
</html>
