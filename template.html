<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} · 深度分析</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,"PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif;
  background:#f5f6fa;color:#1e293b;line-height:1.8
}
.container{display:flex;max-width:1200px;margin:0 auto;padding:40px 24px;gap:40px}

/* 侧边栏导航 */
.sidebar{
  width:240px;flex-shrink:0;position:sticky;top:40px;align-self:start;
  background:#fff;border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.06);max-height:calc(100vh-80px);overflow-y:auto
}
.sidebar h3{font-size:13px;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px}
.sidebar nav{display:flex;flex-direction:column;gap:6px}
.sidebar a{
  font-size:13px;color:#64748b;text-decoration:none;padding:6px 10px;border-radius:8px;transition:all .15s
}
.sidebar a:hover{background:#f1f5f9;color:#4F46E5}

/* 主内容区 */
.main{flex:1;min-width:0}
.banner{
  background:linear-gradient(135deg,#1e1b4b 0%,#312e81 40%,#4338ca 70%,#4F46E5 100%);
  border-radius:20px;padding:48px 56px 40px;margin-bottom:32px;position:relative;overflow:hidden
}
.banner::before{
  content:'';position:absolute;top:-60%;right:-15%;width:400px;height:400px;
  background:rgba(255,255,255,.06);border-radius:50%
}
.banner-label{
  display:inline-block;background:rgba(255,255,255,.15);backdrop-filter:blur(4px);
  color:#a5b4fc;font-size:12px;font-weight:600;padding:4px 14px;border-radius:20px;margin-bottom:20px
}
.banner h1{color:#fff;font-size:34px;font-weight:800;line-height:1.3;margin-bottom:16px;position:relative;z-index:1}
.banner p{color:#c7d2fe;font-size:15px;line-height:1.7;position:relative;z-index:1}
.banner-meta{display:flex;gap:12px;flex-wrap:wrap;margin-top:20px;position:relative;z-index:1}
.banner-meta a{
  display:inline-block;background:rgba(255,255,255,.1);color:#e0e7ff;font-size:12px;padding:4px 14px;border-radius:16px;text-decoration:none
}
.banner-meta a:hover{background:rgba(255,255,255,.2)}
.banner-date{color:#a5b4fc;font-size:13px;position:relative;z-index:1;margin-top:12px}

/* 文章内容区 */
.content{background:#fff;border-radius:20px;padding:48px 56px;box-shadow:0 2px 12px rgba(0,0,0,.06)}

/* 通用段落样式 */
.content p{margin-bottom:16px;font-size:15px;color:#334155}
.content strong{color:#0f172a;font-weight:700}

/* 引用块 */
.content blockquote{
  margin:24px 0 28px;padding:20px 24px 20px 28px;
  background:linear-gradient(135deg,#eef2ff,#f5f3ff);
  border-left:4px solid #4F46E5;border-radius:0 14px 14px 0;font-style:italic
}
.content blockquote p{color:#1e293b;font-size:15px;margin:0}
.content blockquote cite{
  display:block;margin-top:8px;font-size:12px;color:#64748b;font-style:normal;text-align:right
}

/* 标题 */
.content h2{
  font-size:24px;font-weight:700;color:#0f172a;margin:48px 0 20px;padding-top:8px;
  display:flex;align-items:center;gap:10px
}
.content h2 .num{
  display:inline-flex;width:32px;height:32px;background:linear-gradient(135deg,#4F46E5,#7C3AED);
  color:#fff;font-size:14px;font-weight:700;border-radius:8px;align-items:center;justify-content:center;flex-shrink:0
}
.content h3{font-size:18px;font-weight:700;color:#1e293b;margin:32px 0 12px}
.content h4{font-size:15px;font-weight:700;color:#334155;margin:24px 0 8px}

/* 列表 */
.content ul,.content ol{padding-left:24px;margin-bottom:16px}
.content li{margin-bottom:6px;font-size:15px;color:#334155}

/* 数据卡片行 */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin:24px 0 28px}
.stat-card{
  background:linear-gradient(135deg,#f8fafc,#f1f5f9);border-radius:14px;padding:20px;text-align:center
}
.stat-value{
  font-size:28px;font-weight:800;
  background:linear-gradient(135deg,#4F46E5,#7C3AED);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  line-height:1.2;margin-bottom:4px
}
.stat-label{font-size:13px;color:#64748b}

/* 图标卡片（双列） */
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:24px 0}
.card-item{
  background:#f8fafc;border-radius:14px;padding:20px;border:1px solid #e2e8f0
}
.card-item h4{margin:0 0 8px;color:#0f172a}
.card-item p{margin:0;font-size:14px;color:#475569}

/* 表格 */
.content table{width:100%;border-collapse:collapse;margin:24px 0 28px;font-size:14px}
.content th{
  background:#f1f5f9;padding:12px 16px;text-align:left;font-weight:700;color:#1e293b;border-bottom:2px solid #e2e8f0
}
.content td{padding:12px 16px;border-bottom:1px solid #f1f5f9;color:#334155}
.content tr:last-child td{border-bottom:none}
.content tr:hover td{background:#f8fafc}

/* 提示框 */
.tip-box{
  padding:16px 20px;border-radius:12px;margin:24px 0;font-size:14px;line-height:1.6
}
.tip-box.info{background:#eef2ff;border-left:3px solid #4F46E5;color:#312e81}
.tip-box.warn{background:#fffbeb;border-left:3px solid #f59e0b;color:#92400e}
.tip-box.note{background:#f0fdf4;border-left:3px solid #22c55e;color:#166534}
.tip-box .tip-icon{font-weight:700;margin-right:6px}

/* 页脚 */
.footer{
  margin-top:24px;padding:20px 56px;text-align:center;font-size:13px;color:#94a3b8
}

@media(max-width:768px){
  .container{flex-direction:column;padding:20px 16px}
  .sidebar{width:100%;position:static;max-height:none}
  .banner{padding:32px 24px}
  .banner h1{font-size:26px}
  .content{padding:28px 20px}
  .card-grid{grid-template-columns:1fr}
  .stats{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="container">
  <aside class="sidebar">
    <h3>📑 目录</h3>
    <nav>{{TOC}}</nav>
  </aside>
  <div class="main">
    <div class="banner">
      <div class="banner-label">📖 深度分析</div>
      <h1>{{TITLE}}</h1>
      <p>{{EXCERPT}}</p>
      <div class="banner-meta">{{TAGS}}</div>
      <div class="banner-date">{{DATE}}</div>
    </div>
    <div class="content">{{CONTENT}}</div>
    <div class="footer">由 OpenClaw 🤖 生成 · 基于 AI 深度分析</div>
  </div>
</div>
</body>
</html>
